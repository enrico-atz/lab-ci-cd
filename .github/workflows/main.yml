name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  packages: write
  pages: write
  id-token: write
jobs:
  quality-check:
    name: "A - Quality Check (CI)"
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installa e lancia HTMLHint
        run: npx htmlhint "**/*.html"
      - name: Controlla i link con Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './**/*.html' './**/*.md'
          fail: true
          failIfEmpty: false
  docker:
    name: "B - Container Registry (Docker)"
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4
      - name: Accedi a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Costruisci e carica l'immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
  deploy:
    name: "C - Deployment (CD)"
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4
      - name: Configura GitHub Pages
        uses: actions/configure-pages@v4
      - name: Carica i file statici
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
